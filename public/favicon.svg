<svg xmlns="http://www.w3.org/2005/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <!-- Outer smooth container -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" />
  
  <!-- Stylized stethoscope heart + cross outline -->
  <rect x="226" y="110" width="60" height="292" rx="30" fill="url(#crossGrad)" />
  <rect x="110" y="226" width="292" height="60" rx="30" fill="url(#crossGrad)" />

  <!-- Heart glowing backdrop in the center -->
  <circle cx="256" cy="256" r="95" fill="#0f172a" />

  <!-- White high-contrast paw print inside -->
  <g fill="#ffffff">
    <!-- Main bottom pad -->
    <path d="M256 265 c-18 0 -34 12 -34 28 c0 14 10 24 34 24 c24 0 34 -10 34 -24 c0 -16 -16 -28 -34 -28 z" />
    <!-- Left outer toe -->
    <circle cx="206" cy="245" r="14" />
    <!-- Left inner toe -->
    <circle cx="231" cy="215" r="15" />
    <!-- Right inner toe -->
    <circle cx="281" cy="215" r="15" />
    <!-- Right outer toe -->
    <circle cx="306" cy="245" r="14" />
  </g>
</svg>
